# Render Blueprint for the PlanForge API (free tier).
# Render dashboard → New → Blueprint → connect this repo.
# Secrets (sync:false) are entered in the Render dashboard, not committed.
services:
  - type: web
    name: planforge-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install &&
      npm run build --workspace=@planforge/shared-types &&
      npx prisma generate --schema=apps/api/prisma/schema.prisma &&
      npm run build --workspace=@planforge/api
    preDeployCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_FLASH_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_PRO_MODEL
        value: gemini-2.5-flash
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # ── secrets: set these in the Render dashboard ──
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
